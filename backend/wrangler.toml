name = "monday-super-mail-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[env.dev]
name = "monday-super-mail-backend-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "SUPERMAIL_DB"
database_id = "local"

[env.production]
name = "monday-super-mail-backend-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "SUPERMAIL_DB"
database_id = "YOUR_DATABASE_ID"

[vars]
ENVIRONMENT = "dev"
