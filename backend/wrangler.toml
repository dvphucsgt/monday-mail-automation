name = "monday-super-mail-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.dev]
name = "monday-super-mail-backend-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "SUPERMAIL_DB"
database_id = "local"

[env.production]
name = "monday-super-mail-backend-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "SUPERMAIL_DB"
database_id = "YOUR_DATABASE_ID"

[vars]
ENVIRONMENT = "dev"

[[migrations]]
tag = "V1"
new_classes = ["boards", "templates", "integrations", "email_logs", "webhooks"]

[env.dev.migrations_dir]
dir = "src/db/migrations"

[env.production.migrations_dir]
dir = "src/db/migrations"
